<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Cloud - Masuk Ke Aplikasi</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-[#f8fafc] flex items-center justify-center min-h-screen antialiased py-6"
  >
    <div class="w-full max-w-md mx-4">
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-blue-600 text-white text-xl font-mono shadow-md shadow-blue-500/20 mb-3.5"
        >
          CC
        </div>
        <h2 class="text-xl font-bold text-slate-900 tracking-tight">
          Contact Cloud
        </h2>
        <p class="text-xs text-slate-400 mt-0.5">
          Sistem Manajemen Kontak NoSQL Modern
        </p>
      </div>

      <div
        class="bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-200/80"
      >
        <h3
          class="text-sm font-bold text-slate-900 mb-5 border-b border-slate-100 pb-3"
        >
          Selamat Datang Kembali
        </h3>

        <div
          id="error-message-general"
          class="hidden bg-rose-50 border border-rose-200/60 text-rose-700 px-4 py-3 rounded-xl mb-5 text-xs font-medium flex items-center gap-2"
        >
          <span>⚠️</span> <span id="error-text"></span>
        </div>

        <form id="login-form" class="space-y-4" novalidate>
          <div>
            <label
              class="block text-slate-500 text-[10px] font-bold uppercase tracking-wider mb-1.5"
              >Username</label
            >
            <div
              id="username-group"
              class="relative flex items-center bg-slate-50/60 border border-slate-200 rounded-xl focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-500/5 transition duration-150 overflow-hidden"
            >
              <span class="pl-3.5 text-slate-400 text-xs select-none">👤</span>
              <input
                type="text"
                id="username"
                class="w-full pl-2.5 pr-4 py-2.5 bg-transparent focus:outline-none text-slate-900 placeholder-slate-400 text-sm"
                required
                placeholder="Masukkan username anda"
              />
            </div>
            <p
              id="error-username"
              class="text-[11px] text-rose-600 font-medium mt-1.5 hidden"
            >
              ⚠️ Kolom Username wajib diisi.
            </p>
          </div>

          <div>
            <label
              class="block text-slate-500 text-[10px] font-bold uppercase tracking-wider mb-1.5"
              >Password</label
            >
            <div
              id="password-group"
              class="relative flex items-center bg-slate-50/60 border border-slate-200 rounded-xl focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-500/5 transition duration-150 overflow-hidden"
            >
              <span class="pl-3.5 text-slate-400 text-xs select-none">🔒</span>
              <input
                type="password"
                id="password"
                class="w-full pl-2.5 pr-4 py-2.5 bg-transparent focus:outline-none text-slate-900 placeholder-slate-400 text-sm"
                required
                placeholder="••••••••"
              />
            </div>
            <p
              id="error-password"
              class="text-[11px] text-rose-600 font-medium mt-1.5 hidden"
            >
              ⚠️ Kolom Password wajib diisi.
            </p>
          </div>

          <button
            type="submit"
            class="w-full bg-slate-900 text-white font-semibold py-3 px-4 rounded-xl hover:bg-blue-600 active:scale-[0.99] shadow-sm shadow-slate-900/10 transition-all duration-150 cursor-pointer text-center text-sm mt-2"
          >
            Masuk ke Aplikasi ➔
          </button>
        </form>

        <div class="mt-6 pt-5 border-t border-slate-100">
          <div
            class="bg-slate-50/80 border border-slate-200/60 rounded-xl p-3.5"
          >
            <div
              class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-2"
            >
              <span>💡</span> Akses Uji Coba (Demo Mode)
            </div>
            <div class="grid grid-cols-2 gap-y-1 text-xs text-slate-600">
              <div class="font-medium text-slate-400">Username:</div>
              <div
                class="font-mono font-bold text-slate-800 bg-white border border-slate-200 rounded-md px-1.5 py-0.5 w-fit"
              >
                admin
              </div>

              <div class="font-medium text-slate-400 mt-0.5">Password:</div>
              <div
                class="font-mono font-bold text-slate-800 bg-white border border-slate-200 rounded-md px-1.5 py-0.5 w-fit mt-0.5"
              >
                rahasia123
              </div>
            </div>
          </div>
        </div>
      </div>

      <p class="text-center text-[10px] sm:text-xs text-slate-400 mt-8">
        &copy; Arif Maulana. Powered by FastAPI & MongoDB.
      </p>
    </div>

    <script>
      document
        .getElementById("login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const usernameInput = document
            .getElementById("username")
            .value.trim();
          const passwordInput = document
            .getElementById("password")
            .value.trim();

          const errorGeneralDiv = document.getElementById(
            "error-message-general",
          );
          const errorText = document.getElementById("error-text");

          // Reset visual error state awal
          errorGeneralDiv.classList.add("hidden");
          document.getElementById("error-username").classList.add("hidden");
          document.getElementById("error-password").classList.add("hidden");
          document
            .getElementById("username-group")
            .classList.remove(
              "border-rose-400",
              "focus-within:ring-rose-500/5",
            );
          document
            .getElementById("password-group")
            .classList.remove(
              "border-rose-400",
              "focus-within:ring-rose-500/5",
            );

          // Evaluasi Aturan Validasi saat tombol diklik
          let hasError = false;

          if (!usernameInput) {
            document
              .getElementById("error-username")
              .classList.remove("hidden");
            document
              .getElementById("username-group")
              .classList.add("border-rose-400", "focus-within:ring-rose-500/5");
            hasError = true;
          }
          if (!passwordInput) {
            document
              .getElementById("error-password")
              .classList.remove("hidden");
            document
              .getElementById("password-group")
              .classList.add("border-rose-400", "focus-within:ring-rose-500/5");
            hasError = true;
          }

          if (hasError) return; // Stop pengiriman jika form kosong

          try {
            const formData = new URLSearchParams();
            formData.append("username", usernameInput);
            formData.append("password", passwordInput);

            const response = await fetch(`/auth/login`, {
              method: "POST",
              headers: {
                "Content-Type": "application/x-www-form-urlencoded",
              },
              body: formData,
            });

            const data = await response.json();

            if (!response.ok) {
              throw new Error(
                data.detail ||
                  "Login gagal, periksa kembali username/password.",
              );
            }

            localStorage.setItem("access_token", data.access_token);
            window.location.href = "/app";
          } catch (error) {
            errorText.innerText = error.message;
            errorGeneralDiv.classList.remove("hidden");
          }
        });
    </script>
  </body>
</html>
